<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="320" fill="white"/>
  <style>
    .icon-ring   { fill: none; stroke: #185FA5; stroke-width: 3; }
    .icon-check  { fill: none; stroke: #185FA5; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .icon-signal { fill: none; stroke: #185FA5; stroke-linecap: round; }
    .brand-name  { font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 500; fill: #1a1a1a; }
    .brand-tag   { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 400; fill: #666; letter-spacing: 0.12em; }
    .accent-bar  { fill: #185FA5; }
  </style>

  <!-- Outer signal arcs -->
  <path class="icon-signal" stroke-opacity="0.3" stroke-width="2" d="M154,160 A94,94 0 0,1 340,66"/>
  <path class="icon-signal" stroke-opacity="0.3" stroke-width="2" d="M154,160 A94,94 0 0,0 340,254"/>
  <!-- Mid signal arcs -->
  <path class="icon-signal" stroke-opacity="0.55" stroke-width="2" d="M174,160 A74,74 0 0,1 320,86"/>
  <path class="icon-signal" stroke-opacity="0.55" stroke-width="2" d="M174,160 A74,74 0 0,0 320,234"/>

  <!-- Main circle -->
  <circle cx="250" cy="160" r="58" class="icon-ring"/>

  <!-- Checkmark -->
  <path class="icon-check" d="M222,162 L242,182 L280,140"/>

  <!-- Accent bar -->
  <rect class="accent-bar" x="334" y="118" width="4" height="84" rx="2"/>

  <!-- Wordmark -->
  <text class="brand-name" x="352" y="172">Tech<tspan fill="#185FA5">4</tspan>Truth</text>

  <!-- Tagline: centered under wordmark. Wordmark starts at x=352, "Tech4Truth" ~210px wide, so center ~457 -->
  <text class="brand-tag" x="457" y="200" text-anchor="middle">MISSION TECHNOLOGY</text>
</svg>
